[tools]
python = "3.11"
node = "20"
pnpm = "9.15.9"
"conda:conda" = "latest"

[settings]
# The mise conda backend is still experimental. Keep the opt-in project-local
# so `mise install` can install conda without requiring a global user setting.
experimental = true

[env]
BANGERS_DATA_DIR = "{{config_root}}/backend/data"
BANGERS_MODEL_CACHE_DIR = "{{config_root}}/.cache/models"
ACESTEP_PROJECT_ROOT = "{{config_root}}/.cache/models"
HF_HOME = "{{config_root}}/.cache/models/huggingface"
HF_HUB_CACHE = "{{config_root}}/.cache/models/huggingface/hub"

[tasks.setup]
description = "Install local dependencies and create runtime/cache directories"
run = [
  "mkdir -p backend/data/audio backend/data/uploads",
  "mkdir -p .cache/models/checkpoints .cache/models/chat-llm .cache/models/huggingface/hub",
  "conda env create --yes --prefix backend/.conda --file backend/environment.yml || conda env update --prefix backend/.conda --file backend/environment.yml --prune",
  "cd backend && conda run --prefix .conda python -m pip install --prefer-binary --extra-index-url https://download.pytorch.org/whl/cu130 -e '.[dev]'",
  "pnpm --dir frontend install --frozen-lockfile",
]

[tasks.clean]
description = "Delete local runtime data and recreate a fresh data directory"
run = """
set -eu

data_dir="${BANGERS_DATA_DIR:-{{config_root}}/backend/data}"
config_root="{{config_root}}"
home_dir="${HOME:-}"

case "$data_dir" in
  ""|"/"|"$home_dir"|"$config_root"|".")
    echo "Refusing to clean unsafe BANGERS_DATA_DIR: $data_dir" >&2
    exit 1
    ;;
esac

echo "Removing runtime data: $data_dir"
rm -rf "$data_dir"
mkdir -p "$data_dir/audio" "$data_dir/uploads"
echo "Fresh data directory ready: $data_dir"
"""

[tasks.dev]
description = "Run the local backend and frontend without Docker"
run = "python -u start.py"

[tasks.test]
description = "Run backend and frontend tests once"
run = [
  "cd backend && conda run --prefix .conda pytest -v",
  "pnpm --dir frontend exec vitest --run",
]
